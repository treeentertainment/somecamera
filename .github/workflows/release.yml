name: Release APK from latest build

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. v1.0.0)"
        required: true
        default: "V"
      release_title:
        description: "Release title"
        required: true
        default: "V"
      release_body:
        description: "Release notes / content (HTML one line)"
        required: true
        default: ""
        type: string
      draft:
        description: "Create as draft?"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Download latest artifact
        uses: dawidd6/action-download-artifact@v2
        with:
          workflow: build.yml
          workflow_conclusion: success
          name: app-release-apk
          path: extracted

      - name: Install tidy-html5
        run: sudo apt-get update && sudo apt-get install -y tidy

      - name: Format release notes with tidy
        run: |
          echo "${{ github.event.inputs.release_body }}" > raw_release_body.html
          tidy -indent -wrap 0 -quiet -o release_body.html raw_release_body.html || true
          cat release_body.html

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name }}
          name: ${{ github.event.inputs.release_title }}
          body_path: release_body.html
          draft: ${{ github.event.inputs.draft }}
          files: extracted/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
